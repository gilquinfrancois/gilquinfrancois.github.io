<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="taille.js"></script>
    <!-- <script src="randomGp.js"></script> -->
</head>
<body class="bodyRouge">
    <div id="aPrin">
        <div id="contA">
            <a href="menu.html">
                <img class="gpMenu" src="pictures/gpnoel2.png" alt="grand-pere en pere noel">
                <h1>Menu</h1>
                <div id="contLutin">
                    <img class="lt1" src="pictures/frlutin.png" alt="frnaçois lutin">
                    <img class="lt1" src="pictures/thlutin.png" alt="theo lutin">
                    <img class="lt1" src="pictures/pilutin.png" alt="pierre lutin">
                    <audio controls id="autoplay" autoplay="true" loop hidden >
                        <source src="audio/Mariah Carey - All I Want for Christmas Is You (Make My Wish Come True Edition).mp3#t=00:00:03" type="audio/mp3">
                    </audio>
                </div>
            </a>
        </div>
    </div>
    <div style="width: 100%; display: block; position: fixed; text-align: -webkit-center;bottom: 0;z-index: 1;">
        <div style="width: 50px;height: 50px;position: relative; margin-top: 15px;">
            <a id="play"><img src="pictures/play.png" alt="play" style="width: 100%;"></a>
            <a id="stop" style="display: none;" ><img src="pictures/pause.png" alt="stop" style="width: 100%;"></a>
        </div>
    </div>
    <script>
        $(document).ready(function(){
            $('#play').click(function(){
                var aud = document.getElementById('autoplay');
                aud.volume=0.2;
                $('#autoplay').get(0).play();
                $('#play').hide();
                $('#stop').show();
            })
            $('#stop').click(function(){
                $('#autoplay').get(0).pause();
                $('#play').show();
                $('#stop').hide();
            })
        });
    </script>
</body>
</html>
