<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>menu</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="taille.js"></script>
    <script src="detail.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body class="bodyFond">
        <div class="bodyDroite">
            <div id="conteneur">
                <div class="buttonPlusAp buttonPlus divFlex">
                    <img class="gp" src="pictures/gpnoel2.png" alt="grand-pere en pere noel">
                    <div>
                        <h2>Aperitif</h2>
                        <h3>Trios de verines</h3>
                    </div>
                </div>
                <div class="buttonPlusEF buttonPlus divFlex">
                    <img class="gp" src="pictures/gpnoel2.png" alt="grand-pere en pere noel">
                    <div>
                        <h2>Entree Froide</h2>
                        <h3>Foie gras</h3>
                    </div>
                </div>
                <div class="buttonPlus buttonPlusS divFlex">
                    <img class="gp" src="pictures/gpnoel2.png" alt="grand-pere en pere noel">
                    <div>
                        <h2>Soupe</h2>
                        <h3>Soupe de potirons</h3>
                    </div>
                </div>
                <div class="buttonPlusEC buttonPlus divFlex">
                    <img class="gp" src="pictures/gpnoel2.png" alt="grand-pere en pere noel">
                    <div>
                        <h2>Entree Chaude</h2>
                        <h3>Trios de poissons</h3>
                    </div>
                </div>    
                <div class="buttonPlus buttonPlusP divFlex">

                    <img class="gp" src="pictures/gpnoel2.png" alt="grand-pere en pere noel">
                    <div>
                        <h2>Plat</h2>
                        <h3>Dinde</h3>
                    </div>
                </div>
                <div class="buttonPlus buttonPlusD divFlex">
                    <img class="gp" src="pictures/gpnoel2.png" alt="grand-pere en pere noel">
                    <div>
                        <h2>Desert</h2>
                        <h3>Buche</h3>
                    </div>
                </div>
            </div>
        </div>
    <div class="contDetail">
        <div class="detail" id="detail1">
            <div id="croix"><i class="fa fa-snowflake-o" aria-hidden="true"></i></div>
            <div>
                <h4 id="titreDetail">

                </h4>
                <p id="textDetail">

                </p>
            </div>
            
        </div>
    </div>
    <audio controls id="autoplay" loop hidden >
        <source src="audio/noel.mp3" type="audio/mp3">
    </audio>
    <audio controls id="autoplay2" loop hidden >
        <source src="audio/soupe.mp3" type="audio/mp3">
    </audio>
    <audio controls id="autoplay3" loop hidden >
        <source src="audio/EFroide.mp3#t=00:00:49" type="audio/mp3">
    </audio>
    <audio controls id="autoplay4" loop hidden >
        <source src="audio/EChaude.mp3" type="audio/mp3">
    </audio>
    <audio controls id="autoplay5" loop hidden >
        <source src="audio/Plat.mp3#t=00:00:04" type="audio/mp3">
    </audio>
    <audio controls id="autoplay6" loop hidden >
        <source src="audio/dessert.mp3#t=00:00:27" type="audio/mp3">
    </audio>
    <script>
        $(document).ready(function(){
            $('.buttonPlusAp').click(function(){
                var aud = document.getElementById('autoplay');
                aud.volume=0.2;
                $('#autoplay').get(0).play();
            })
            $('.buttonPlusEF').click(function(){
                var aud = document.getElementById('autoplay3');
                aud.volume=0.2;
                $('#autoplay3').get(0).play();
            })
            $('.buttonPlusEC').click(function(){
                var aud = document.getElementById('autoplay4');
                aud.volume=0.3;
                $('#autoplay4').get(0).play();
            })
            $('.buttonPlusS').click(function(){
                var aud = document.getElementById('autoplay2');
                aud.volume=0.1;
                $('#autoplay2').get(0).play();
            })
            $('.buttonPlusP').click(function(){
                var aud = document.getElementById('autoplay5');
                aud.volume=0.2;
                $('#autoplay5').get(0).play();
            })
            $('.buttonPlusD').click(function(){
                var aud = document.getElementById('autoplay6');
                aud.volume=0.2;
                $('#autoplay6').get(0).play();
            })
            $('#croix').click(function(){
                $('#autoplay').get(0).pause();
                $('#autoplay2').get(0).pause();
                $('#autoplay3').get(0).pause();
                $('#autoplay4').get(0).pause();
                $('#autoplay5').get(0).pause();
                $('#autoplay6').get(0).pause();
            })
        });
    </script>
</body>
</html>
